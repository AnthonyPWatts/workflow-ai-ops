services:
  n8n:
    image: n8nio/n8n:latest
    container_name: workflow-ai-ops-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      - GENERIC_TIMEZONE=Europe/London
      - TZ=Europe/London
    volumes:
      - "C:\\AI-Ops-Data\\n8n_data:/home/node/.n8n"
      - "./prompts:/home/node/.n8n-files/prompts"
      - "./payloads:/home/node/.n8n-files/payloads"
      - "./workflows:/home/node/.n8n-files/workflows"
    restart: unless-stopped